<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Gamificação</title>
  <link rel="stylesheet" href="./quest.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand-row">
        <button class="icon-button close" aria-label="Fechar">
          <span></span>
          <span></span>
        </button>
        <div class="brand">CorpWare</div>
      </div>

      <div class="module-progress" aria-label="Progresso do módulo">
        <div class="progress-meta">
          <span>1 / 3 QUESTÕES</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>
      </div>

      <div class="stats">
        <div class="timer">
          <span class="timer-icon" aria-hidden="true">◴</span>
          <span id="timer">30:00</span>
        </div>
        <div class="xp">
          <span aria-hidden="true">⚡</span>
          <span>1,250 XP</span>
        </div>
      </div>
    </header>

    <main class="challenge">
      <section class="question-panel" aria-labelledby="question-title">
        <div class="completion-banner" id="completion-banner" hidden>
          <strong id="completion-title">Quiz finalizado</strong>
          <span id="completion-subtitle">Confira seu desempenho final.</span>
        </div>

        <h1 id="question-title"></h1>

        <div class="answers" role="radiogroup" aria-label="Alternativas">
          <button class="answer" type="button" role="radio" aria-checked="false" data-option="A">
            <span class="answer-letter">A</span>
            <span class="answer-text"></span>
            <span class="choice-ring"></span>
          </button>
          <button class="answer" type="button" role="radio" aria-checked="false" data-option="B">
            <span class="answer-letter">B</span>
            <span class="answer-text"></span>
            <span class="choice-ring"></span>
          </button>
          <button class="answer" type="button" role="radio" aria-checked="false" data-option="C">
            <span class="answer-letter">C</span>
            <span class="answer-text"></span>
            <span class="choice-ring"></span>
          </button>
          <button class="answer" type="button" role="radio" aria-checked="false" data-option="D">
            <span class="answer-letter">D</span>
            <span class="answer-text"></span>
            <span class="choice-ring"></span>
          </button>
        </div>

        <div class="action-row">
          <button class="skip-button" type="button">PULAR QUESTÃO</button>
          <button class="confirm-button" type="button">CONFIRMAR RESPOSTA</button>
        </div>
      </section>

      <aside class="result-card" aria-label="Resultado do quiz">
        <div class="result-head">
          <div class="success-mark">✓</div>
          <div>
            <h2>DESEMPENHO</h2>
          </div>
        </div>

        <div class="score-list">
          <div>
            <span>Acertos</span>
            <strong id="correct-count">0</strong>
          </div>
          <div>
            <span>Erros</span>
            <strong id="incorrect-count">0</strong>
          </div>
          <div>
            <span>Puladas</span>
            <strong class="combo" id="skipped-count">0</strong>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="quest.js"></script>
</body>
</html>
