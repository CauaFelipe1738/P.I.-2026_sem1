<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Gameficação</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="left">
      <div class="left-content">
        <h1>DESBLOQUEIE<br><span>SEU<br>POTENCIAL</span></h1>
        <p class="description">
        </p>
      </div>
    </div>
    <div class="right">
      <div class="login-box">
        <h2>AUTENTICAÇÃO</h2>
        <p class="subtitle">Insira suas credenciais para acessar.</p>

        <form>
          <label for="email">LOGIN</label>
          <div class="field">
            <input id="email" type="email" placeholder="usuario@Gmail.com">
          </div>

          <div class="password-head">
            <label for="senha">CHAVE DE ACESSO</label>
          </div>
          <div class="field">
            <input id="senha" type="password" placeholder="••••••••••••" autocomplete="off">
          </div>

          <div class="options">
            <label class="switch">
              <input type="checkbox">
              <span class="slider"></span>
            </label>
            <span>Manter sessão ativa</span>
          </div>

          <p id="mensagem"></p>
          <button type="button" class="btn" onclick="login()">
            ACESSAR SISTEMA →
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
<script src="script.js"></script>

</html>
