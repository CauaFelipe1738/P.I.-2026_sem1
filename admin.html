<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJETO INTEGRADOR</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/lateral.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <h1>CorpWare</h1>
            </div>

            <aside>
                <ul class="menu">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="ranking.html">Ranking</a></li>
                    <li><a href="config.html">Configuração</a></li>
                    <li class="active"><a href="admin.html">Administrador</a></li>
                </ul>
            </aside>
        </aside>

        <main class="content">
            <header class="topbar">
                <div class="profile">
                    <div class="profile-meta">
                        <strong>Nome do Admin</strong>
                        <p>Administração</p>
                    </div>
                    <div class="profile-auth">
                        <div class="avatar">Na</div>
                    </div>
                </div>
            </header>

            <div class="admin-page">
                <section class="admin-area" aria-labelledby="admin-title">
                    <div class="admin-heading">
                        <div>
                            <span class="admin-kicker">Painel restrito</span>
                            <h3 id="admin-title">Administrador</h3>
                        </div>
                        <button class="admin-link" type="button" data-admin-detail="ranking">Ver relatório
                            completo</button>
                    </div>

                    <div class="admin-metrics">
                        <button class="admin-metric" type="button" data-admin-detail="conclusao">
                            <span>Conclusão global</span>
                            <strong>84,2%</strong>
                            <small>+3,1% no mês</small>
                        </button>
                        <button class="admin-metric purple" type="button" data-admin-detail="desempenho">
                            <span>Desempenho médio</span>
                            <strong>792</strong>
                            <small>pontos por colaborador</small>
                        </button>
                        <button class="admin-metric blue" type="button" data-admin-detail="colaboradores">
                            <span>Colaboradores ativos</span>
                            <strong>1.284</strong>
                            <small>96 novos acessos</small>
                        </button>
                    </div>
            </div>
        </main>
        <script src="./admin.js"></script>
</body>

</html>
