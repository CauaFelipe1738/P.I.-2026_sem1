<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Gameficação</title>
  <link rel="stylesheet" href="./login.css">
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="left-content">
        <p class="kicker">PROTOTIPO GAMIFICAÇÃO</p>
        <h1>DESBLOQUEIE<br><span>SEU<br>POTENCIAL</span></h1>
        <p class="description"> 
          Acesse a fronteira do conhecimento corporativo através de nossa interface de alta performance. Nível 42 aguarda sua ignição.
        </p>
      </div>
    </div>
    <div class="right">
      <div class="login-box">
        <h2>AUTENTICAÇÃO</h2>
        <p class="subtitle">Insira suas credenciais para acessar a central.</p>

        <form>
          <label for="email">LOGIN</label>
          <div class="field">
            <input id="email" type="email" placeholder="usuario@Gmail.com">
          </div>

          <div class="password-head">
            <label for="senha">CHAVE DE ACESSO</label>
            <a href="#">ESQUECI MINHA SENHA</a>
          </div>
          <div class="field">
            <input id="senha" type="password" placeholder="••••••••••••">
          </div>

          <div class="options">
            <label class="switch">
              <input type="checkbox">
              <span class="slider"></span>
            </label>
            <span>Manter sessão ativa</span>
          </div>

          <a href="../index.html" class="btn">ACESSAR SISTEMA →</a>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
