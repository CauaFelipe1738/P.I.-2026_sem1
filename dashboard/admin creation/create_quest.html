<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Questionario</title>
    <link rel="stylesheet" href="../../css/create_quest.css">
</head>

<body>
    <main class="quest-page">
        <header class="page-header">
            <div class="page-title">
                <h1>Criar Questionario</h1>
                <p>Crie questionarios para avaliacoes e pesquisas.</p>
            </div>

            <div class="header-actions">
                <a class="button cancel-button" href="./questionario.html">Cancelar</a>
                <button class="button save-button" type="button" id="save-questionnaire">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
                        <path d="M17 21v-8H7v8"></path>
                        <path d="M7 3v5h8"></path>
                    </svg>
                    Salvar Questionario
                </button>
            </div>
        </header>

        <form class="content-grid" id="questionnaire-form">
            <div class="main-column">

                <section class="panel dates-panel" aria-labelledby="dates-title">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="M8 2v4"></path>
                            <path d="M16 2v4"></path>
                            <path d="M3 10h18"></path>
                            <path d="M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"></path>
                        </svg>
                        <h2 id="dates-title">Periodo do Questionario</h2>
                    </div>

                    <div class="date-grid">
                        <label class="field">
                            <span>Data de inicio</span>
                            <input type="date" name="data_inicio">
                        </label>

                        <label class="field">
                            <span>Data de fim</span>
                            <input type="date" name="data_fim">
                        </label>
                    </div>
                </section>  
            </div>
        </form>
    </main>

    <script src="./admin-utils.js"></script>
    <script src="./create_quest.js"></script>
</body>

</html>
