<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuários</title>
    <link rel="stylesheet" href="../../css/user.css">
    <link rel="stylesheet" href="../../css/base.css">
</head>

<body>
    <main class="users-page">
        <header class="page-header">
                        <a class="back-button" href="../admin.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M19 12H5"></path>
                    <path d="m12 19-7-7 7-7"></path>
                </svg>
                Voltar para Admin
            </a>
            <div class="page-title">
                <h1>Editar Perguntas</h1>
                <p>Gerencie e edite informações de perguntas existentes.</p>
            </div>
            <a class="create-button" type="button" href="create_pergunta.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
                Criar Nova Pergunta
            </a>
        </header>

        <section class="toolbar" aria-label="Filtros de usuários">
            <label class="search-field">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="m20 20-3.5-3.5"></path>
                </svg>
                <input type="search" placeholder="Buscar por pergunta..." aria-label="Buscar por pergunta">
            </label>

            <div class="toolbar-actions" aria-label="Acoes de perguntas">
                <a class="toolbar-button primary" href="create_pergunta.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                    Criar
                </a>
                <button class="toolbar-button" type="button" id="edit-selected-question" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="m16 4 4 4L8 20H4v-4L16 4Z"></path>
                        <path d="m14 6 4 4"></path>
                    </svg>
                    Editar
                </button>
                <button class="toolbar-button danger" type="button" id="delete-selected-question" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M3 6h18"></path>
                        <path d="M8 6V4h8v2"></path>
                        <path d="M19 6 18 20H6L5 6"></path>
                        <path d="M10 11v5"></path>
                        <path d="M14 11v5"></path>
                    </svg>
                    Deletar
                </button>
            </div>
        </section>

        <div class="theme-panel" aria-label="Filtro de tema">
            <div class="theme-panel-copy">
                <strong>Tema</strong>
                <span>Filtre as perguntas por tema cadastrado.</span>
            </div>

            <label class="theme-select-field">
                <span>Tema</span>
                <select id="question-theme-filter" aria-label="Filtrar por tema">
                    <option value="">Todos os temas</option>
                </select>
            </label>
        </div>

        <section class="users-table-wrap" aria-label="Lista de usuários">
            <table>
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Area</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="questions-table-body"></tbody>
            </table>

            <footer class="table-footer">
                <span>Mostrando 1 a 6 de 6 perguntas</span>
                <nav class="pagination" aria-label="Paginação">
                    <button class="page-arrow" type="button" aria-label="Página anterior">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m15 18-6-6 6-6"></path>
                        </svg>
                    </button>
                    <button class="page-number" type="button" aria-current="page">1</button>
                    <button class="page-arrow" type="button" aria-label="Próxima página">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m9 18 6-6-6-6"></path>
                        </svg>
                    </button>
                </nav>
            </footer>
        </section>
    </main>
    <script src="./pergunta.js"></script>
</body>

</html>
