<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuários</title>
    <link rel="stylesheet" href="../../css/user.css">
    <link rel="stylesheet" href="../../css/base.css">
</head>

<body>
    <main class="users-page">
        <header class="page-header">
                        <a class="back-button" href="../admin.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M19 12H5"></path>
                    <path d="m12 19-7-7 7-7"></path>
                </svg>
                Voltar para Admin
            </a>
            <div class="page-title">
                <h1>Editar Perguntas</h1>
                <p>Gerencie e edite informações de perguntas existentes.</p>
            </div>
            <a class="create-button" type="button" href="create_pergunta.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
                Criar Nova Pergunta
            </a>
        </header>

        <section class="toolbar" aria-label="Filtros de usuários">
            <label class="search-field">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="m20 20-3.5-3.5"></path>
                </svg>
                <input type="search" placeholder="Buscar por pergunta..." aria-label="Buscar por pergunta">
            </label>

        </section>

        <div class="theme-panel" aria-label="Filtro de tema">
            <div class="theme-panel-copy">
                <strong>Tema</strong>
                <span>Filtre as perguntas por tema cadastrado.</span>
            </div>

            <label class="theme-select-field">
                <span>Tema</span>
                <select id="question-theme-filter" aria-label="Filtrar por tema">
                    <option value="">Todos os temas</option>
                </select>
            </label>

            <div class="theme-actions">
                <button class="toolbar-button primary theme-create-button" type="button" id="open-theme-modal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                    Criar tema
                </button>
                <button class="toolbar-button danger theme-delete-button" type="button" id="delete-theme" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M3 6h18"></path>
                        <path d="M8 6V4h8v2"></path>
                        <path d="M19 6 18 20H6L5 6"></path>
                        <path d="M10 11v5"></path>
                        <path d="M14 11v5"></path>
                    </svg>
                    Deletar tema
                </button>
            </div>
        </div>

        <section class="users-table-wrap" aria-label="Lista de usuários">
            <table>
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Area</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="questions-table-body"></tbody>
            </table>

            <footer class="table-footer">
                <span>Mostrando 1 a 6 de 6 perguntas</span>
                <nav class="pagination" aria-label="Paginação">
                    <button class="page-arrow" type="button" aria-label="Página anterior">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m15 18-6-6 6-6"></path>
                        </svg>
                    </button>
                    <button class="page-number" type="button" aria-current="page">1</button>
                    <button class="page-arrow" type="button" aria-label="Próxima página">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m9 18 6-6-6-6"></path>
                        </svg>
                    </button>
                </nav>
            </footer>
        </section>
    </main>

    <div class="modal-overlay" id="theme-modal" aria-hidden="true">
        <div class="theme-modal" role="dialog" aria-modal="true" aria-labelledby="theme-modal-title">
            <div class="theme-modal-header">
                <h2 id="theme-modal-title">Criar tema</h2>
                <button class="modal-close" type="button" id="close-theme-modal" aria-label="Fechar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </div>

            <label class="theme-modal-field">
                <span>Nome do tema</span>
                <input type="text" maxlength="80" aria-label="Nome do tema" id="new-theme-name">
            </label>

            <div class="modal-actions">
                <button class="toolbar-button" type="button" id="cancel-theme-modal">Cancelar</button>
                <button class="toolbar-button primary" type="button" id="save-theme">Salvar tema</button>
            </div>
        </div>
    </div>

    <script src="./admin-utils.js"></script>
    <script src="./pergunta.js"></script>
</body>

</html>
