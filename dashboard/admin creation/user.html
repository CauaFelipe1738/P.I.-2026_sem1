<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuários</title>
    <link rel="stylesheet" href="../../css/user.css">
    <link rel="stylesheet" href="../../css/base.css">
</head>

<body>
    <main class="users-page">
        <header class="page-header">
                        <a class="back-button" href="../admin.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M19 12H5"></path>
                    <path d="m12 19-7-7 7-7"></path>
                </svg>
                Voltar para Admin
            </a>
            <div class="page-title">
                <h1>Editar Usuários</h1>
                <p>Gerencie e edite informações, permissões e acessos de usuários existentes.</p>
            </div>
            <a class="create-button" type="button" href="create_user.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
                Criar Novo Usuário
            </a>
        </header>

        <section class="toolbar" aria-label="Filtros de usuários">
            <label class="search-field">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="m20 20-3.5-3.5"></path>
                </svg>
                <input type="search" placeholder="Buscar por nome ou e-mail..." aria-label="Buscar por nome ou e-mail">
            </label>
        </section>

        <section class="users-table-wrap" aria-label="Lista de usuários">
            <table>
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>titulo</th>
                        <th>Tipo de Acesso</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="user-cell">
                                <span class="avatar am">AM</span>
                                Ana Martins
                            </div>
                        </td>
                        <td>Gerente de RH</td>
                        <td><span class="badge admin">Administrador</span></td>
                        <td>
                            <div class="actions">
                                <button class="icon-button" type="button" aria-label="Visualizar Ana Martins">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                                <button class="icon-button" type="button" aria-label="Editar Ana Martins">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                                        <path d="m16 4 4 4L8 20H4v-4L16 4Z"></path>
                                        <path d="m14 6 4 4"></path>
                                    </svg>
                                </button>
                                <button class="icon-button" type="button" aria-label="Excluir Ana Martins">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                                        <path d="M3 6h18"></path>
                                        <path d="M8 6V4h8v2"></path>
                                        <path d="M19 6 18 20H6L5 6"></path>
                                        <path d="M10 11v5"></path>
                                        <path d="M14 11v5"></path>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <footer class="table-footer">
                <span>Mostrando 1 a 6 de 6 usuários</span>
                <nav class="pagination" aria-label="Paginação">
                    <button class="page-arrow" type="button" aria-label="Página anterior">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m15 18-6-6 6-6"></path>
                        </svg>
                    </button>
                    <button class="page-number" type="button" aria-current="page">1</button>
                    <button class="page-arrow" type="button" aria-label="Próxima página">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m9 18 6-6-6-6"></path>
                        </svg>
                    </button>
                </nav>
            </footer>
        </section>
    </main>
</body>

</html>
