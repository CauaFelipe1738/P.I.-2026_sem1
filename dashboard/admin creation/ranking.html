<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Rankings</title>
    <link rel="stylesheet" href="../../css/user.css">
    <link rel="stylesheet" href="../../css/base.css">
</head>

<body>
    <main class="users-page">
        <header class="page-header">
            <a class="back-button" href="../admin.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M19 12H5"></path>
                    <path d="m12 19-7-7 7-7"></path>
                </svg>
                Voltar para Admin
            </a>

            <div class="page-title">
                <h1>Editar Rankings</h1>
                <p>Gerencie rankings, limite de participantes e descricoes exibidas na plataforma.</p>
            </div>

            <a class="create-button" href="create_ranking.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
                Criar Novo Ranking
            </a>
        </header>

        <section class="toolbar" aria-label="Filtros de rankings">
            <label class="search-field">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="m20 20-3.5-3.5"></path>
                </svg>
                <input type="search" placeholder="Buscar por titulo ou descricao..." aria-label="Buscar por titulo ou descricao">
            </label>
        </section>

        <section class="users-table-wrap" aria-label="Lista de rankings">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Qtd_pessoas</th>
                        <th>Titulo</th>
                        <th>Sobre</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody id="rankings-table-body"></tbody>
            </table>

            <footer class="table-footer">
                <span>Mostrando 0 de 0 rankings</span>
                <nav class="pagination" aria-label="Paginacao">
                    <button class="page-arrow" type="button" aria-label="Pagina anterior">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m15 18-6-6 6-6"></path>
                        </svg>
                    </button>
                    <button class="page-number" type="button" aria-current="page">1</button>
                    <button class="page-arrow" type="button" aria-label="Proxima pagina">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m9 18 6-6-6-6"></path>
                        </svg>
                    </button>
                </nav>
            </footer>
        </section>
    </main>

    <script src="./admin-utils.js"></script>
    <script src="./ranking.js"></script>
</body>

</html>
