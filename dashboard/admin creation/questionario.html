<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Questionarios</title>
    <link rel="stylesheet" href="../../css/user.css">
    <link rel="stylesheet" href="../../css/base.css">
</head>

<body>
    <main class="users-page">
        <header class="page-header">
                        <a class="back-button" href="../admin.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M19 12H5"></path>
                    <path d="m12 19-7-7 7-7"></path>
                </svg>
                Voltar para Admin
            </a>
            <div class="page-title">
                <h1>Editar Questionarios</h1>
                <p>Gerencie as datas de inicio e fim dos questionarios existentes.</p>
            </div>
            <a class="create-button" type="button" href="create_quest.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
                Criar Novo Questionario
            </a>
        </header>

        <section class="toolbar" aria-label="Filtros de usuários">
            <label class="search-field">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="m20 20-3.5-3.5"></path>
                </svg>
                <input type="search" placeholder="Buscar por id ou data..." aria-label="Buscar por id ou data">
            </label>
        </section>

        <section class="users-table-wrap" aria-label="Lista de usuários">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data de Inicio</th>
                        <th>Data de fim</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="questionnaires-table-body"></tbody>
            </table>

            <footer class="table-footer">
                <span>Mostrando 0 de 0 questionarios</span>
                <nav class="pagination" aria-label="Paginação">
                    <button class="page-arrow" type="button" aria-label="Página anterior">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m15 18-6-6 6-6"></path>
                        </svg>
                    </button>
                    <button class="page-number" type="button" aria-current="page">1</button>
                    <button class="page-arrow" type="button" aria-label="Próxima página">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="m9 18 6-6-6-6"></path>
                        </svg>
                    </button>
                </nav>
            </footer>
        </section>
    </main>
    <script src="./questionario.js"></script>
</body>

</html>
